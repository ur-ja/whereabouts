name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      EXPO_NO_DOCTOR: 1
      CI: 1
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Supabase secrets
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Add EXPO_PUBLIC_SUPABASE_URL and EXPO_PUBLIC_SUPABASE_ANON_KEY as GitHub repository secrets."
            exit 1
          fi

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile for unsigned build
        run: |
          python3 <<'PY'
          from pathlib import Path

          podfile = Path("ios/Podfile")
          text = podfile.read_text()
          marker = "CODE_SIGNING_ALLOWED"
          if marker not in text:
              snippet = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                end
              end
          """
              text = text.replace(
                  "post_install do |installer|",
                  "post_install do |installer|" + snippet,
                  1,
              )
              podfile.write_text(text)
          PY

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned archive
        run: |
          set -euo pipefail
          WORKSPACE=$(find ios -maxdepth 1 -name '*.xcworkspace' | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "::error::No .xcworkspace found in ios/"
            ls -la ios/
            exit 1
          fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace=$WORKSPACE scheme=$SCHEME"

          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/whereabouts.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find "$RUNNER_TEMP/whereabouts.xcarchive/Products/Applications" -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in archive"
            find "$RUNNER_TEMP/whereabouts.xcarchive" -maxdepth 6
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr whereabouts.ipa Payload
          ls -lh whereabouts.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: whereabouts-ios
          path: ${{ runner.temp }}/whereabouts.ipa
          retention-days: 30
